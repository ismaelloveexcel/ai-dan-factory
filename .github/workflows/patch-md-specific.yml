name: Patch MD specific fixes

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Apply fixes
        env:
          GH_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
        run: python3 scripts/patch_md_specific.py
