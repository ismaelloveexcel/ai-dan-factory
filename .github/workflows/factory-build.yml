name: factory-build

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "GitHub repository slug for the generated project"
        required: true
        type: string
      build_brief_json:
        description: "BuildBrief JSON payload"
        required: true
        type: string
      dry_run:
        description: "Run without side effects"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TEMPLATE_PROJECT_DIR: templates/saas-template

    steps:
      - name: 1) checkout
        uses: actions/checkout@v4

      - name: 2) setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 3) run create_project.py
        env:
          GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          TEMPLATE_OWNER: ${{ github.repository_owner }}
          TEMPLATE_REPO: ${{ github.event.repository.name }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python scripts/create_project.py \
            --project-id "${{ inputs.project_id }}" \
            --org "${{ github.repository_owner }}" \
            $DRY_RUN_FLAG

      - name: 4) run inject_brief.py
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          BRIEF_FILE="$RUNNER_TEMP/build-brief.json"
          printf '%s' '${{ inputs.build_brief_json }}' > "$BRIEF_FILE"
          python scripts/inject_brief.py \
            --project-dir "$TEMPLATE_PROJECT_DIR" \
            --brief-file "$BRIEF_FILE" \
            $DRY_RUN_FLAG

      - name: 5) run deploy.py
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python scripts/deploy.py \
            --project-id "${{ inputs.project_id }}" \
            $DRY_RUN_FLAG
