name: factory-build

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "GitHub repository slug for the generated project"
        required: true
        type: string
      build_brief_json:
        description: "BuildBrief JSON payload (required unless run_automated_tests_only=true)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Simulate execution without side effects"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_automated_tests_only:
        description: "Run automated factory tests only (no live create/deploy)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      test_mode:
        description: "DEPRECATED alias for run_automated_tests_only"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      traffic_signal:
        description: "Monitoring signal LOW/MEDIUM/HIGH"
        required: false
        default: "LOW"
        type: choice
        options:
          - "LOW"
          - "MEDIUM"
          - "HIGH"
      activation_metric:
        description: "Activation signal LOW/MEDIUM/HIGH"
        required: false
        default: "LOW"
        type: choice
        options:
          - "LOW"
          - "MEDIUM"
          - "HIGH"
      revenue_signal_status:
        description: "Revenue signal NONE/WEAK/STRONG"
        required: false
        default: "NONE"
        type: choice
        options:
          - "NONE"
          - "WEAK"
          - "STRONG"
      correlation_id:
        description: "End-to-end correlation ID for tracing (from Managing Director)"
        required: false
        default: ""
        type: string
      callback_url:
        description: "URL to POST build results back to Managing Director"
        required: false
        default: ""
        type: string

jobs:
  build:
    timeout-minutes: 45
    concurrency:
      group: factory-build-${{ github.ref }}-${{ inputs.project_id || 'unknown' }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      factory_response: ${{ steps.finalize.outputs.factory_response }}
    env:
      TEMPLATE_PROJECT_DIR: templates/saas-template
      RESULT_ARTIFACT_NAME: factory-result-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: 1) Checkout repository
        uses: actions/checkout@v4

      - name: 2) Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 3) Initialize run context
        env:
          BUILD_BRIEF_JSON: ${{ inputs.build_brief_json }}
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          set -euo pipefail
          RESULT_DIR="$(mktemp -d "$RUNNER_TEMP/factory-results-${{ github.run_id }}-${{ github.run_attempt }}-XXXXXX")"
          BRIEF_FILE="$(mktemp "$RUNNER_TEMP/build-brief-${{ github.run_id }}-${{ github.run_attempt }}-XXXXXX.json")"
          NORMALIZED_INPUTS_FILE="$(mktemp "$RUNNER_TEMP/normalized-inputs-${{ github.run_id }}-${{ github.run_attempt }}-XXXXXX.json")"
          TESTS_ONLY_LOG_FILE="$RESULT_DIR/tests_only.log"
          STATE_DB="data/lifecycle.sqlite"
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TIMESTAMP_UTC="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          printf '%s' "$BUILD_BRIEF_JSON" > "$BRIEF_FILE"

          echo "::add-mask::$FACTORY_GITHUB_TOKEN"
          echo "::add-mask::$VERCEL_DEPLOY_HOOK_URL"

          echo "RESULT_DIR=$RESULT_DIR" >> "$GITHUB_ENV"
          echo "BRIEF_FILE=$BRIEF_FILE" >> "$GITHUB_ENV"
          echo "NORMALIZED_INPUTS_FILE=$NORMALIZED_INPUTS_FILE" >> "$GITHUB_ENV"
          echo "TESTS_ONLY_LOG_FILE=$TESTS_ONLY_LOG_FILE" >> "$GITHUB_ENV"
          echo "STATE_DB=$STATE_DB" >> "$GITHUB_ENV"
          echo "WORKFLOW_URL=$WORKFLOW_URL" >> "$GITHUB_ENV"
          echo "TIMESTAMP_UTC=$TIMESTAMP_UTC" >> "$GITHUB_ENV"
          echo "RUN_ID=${{ github.run_id }}" >> "$GITHUB_ENV"
          echo "RUN_ATTEMPT=${{ github.run_attempt }}" >> "$GITHUB_ENV"
          echo "CORRELATION_ID=${{ inputs.correlation_id }}" >> "$GITHUB_ENV"
          echo "CALLBACK_URL=${{ inputs.callback_url }}" >> "$GITHUB_ENV"

      - name: 3b) Adapt MD BuildBrief to Factory schema
        if: inputs.build_brief_json != ''
        run: |
          set -euo pipefail
          # Detect if the brief is from the Managing Director (has schema_version/idea_id)
          # and convert it to Factory-native format if needed
          python - <<'PY'
          import json, os, sys
          sys.path.insert(0, "scripts")
          from brief_adapter import adapt_brief

          brief_file = os.environ["BRIEF_FILE"]
          with open(brief_file, "r", encoding="utf-8") as f:
              content = f.read().strip()
          if not content:
              sys.exit(0)
          try:
              brief = json.loads(content)
          except json.JSONDecodeError:
              sys.exit(0)

          # Only adapt if it looks like an MD brief (has idea_id or schema_version)
          if brief.get("idea_id") or brief.get("schema_version"):
              adapted = adapt_brief(brief)
              with open(brief_file, "w", encoding="utf-8") as f:
                  json.dump(adapted, f, indent=2, ensure_ascii=True)
              print(f"[brief_adapter] Converted MD brief to Factory schema for project {adapted.get('project_id')}")
          else:
              print("[brief_adapter] Brief is already in Factory-native format, skipping adaptation")
          PY

      - name: 4) Normalize and validate input contract
        env:
          RAW_PROJECT_ID: ${{ inputs.project_id }}
          RAW_BUILD_BRIEF_JSON: ${{ inputs.build_brief_json }}
          RAW_DRY_RUN: ${{ inputs.dry_run }}
          RAW_RUN_AUTOMATED_TESTS_ONLY: ${{ inputs.run_automated_tests_only }}
          RAW_TEST_MODE: ${{ inputs.test_mode }}
        run: |
          set -euo pipefail
          python scripts/normalize_workflow_inputs.py \
            --project-id "$RAW_PROJECT_ID" \
            --build-brief-json "$RAW_BUILD_BRIEF_JSON" \
            --dry-run "$RAW_DRY_RUN" \
            --run-automated-tests-only "$RAW_RUN_AUTOMATED_TESTS_ONLY" \
            --test-mode "$RAW_TEST_MODE" \
            --normalized-output "$NORMALIZED_INPUTS_FILE" \
            --result-file "$RESULT_DIR/normalize_inputs.json"

          python - <<'PY' >> "$GITHUB_ENV"
          import json
          import os
          from pathlib import Path

          data = json.loads(Path(os.environ["NORMALIZED_INPUTS_FILE"]).read_text(encoding="utf-8"))

          def as_bool(v: object) -> str:
              return "true" if bool(v) else "false"

          print(f"PROJECT_ID_INPUT={data['project_id']}")
          print(f"RUN_MODE={data['run_mode']}")
          print(f"EFFECTIVE_DRY_RUN={as_bool(data.get('dry_run_effective'))}")
          print(f"RUN_AUTOMATED_TESTS_ONLY_EFFECTIVE={as_bool(data.get('run_automated_tests_only_effective'))}")
          print(f"DEPRECATED_TEST_MODE_REQUESTED={as_bool(data.get('deprecated_test_mode_requested'))}")
          PY

      - name: 4b) Warn on deprecated test_mode input
        if: env.DEPRECATED_TEST_MODE_REQUESTED == 'true'
        run: |
          echo "::warning::Input 'test_mode' is deprecated. Use 'run_automated_tests_only' instead."

      - name: 5) Run automated tests only
        if: env.RUN_MODE == 'tests_only'
        run: |
          set -euo pipefail
          set +e
          python scripts/run_factory_tests.py > "$TESTS_ONLY_LOG_FILE" 2>&1
          TEST_EXIT=$?
          set -e

          STEP_STATUS="success"
          STEP_ERROR=""
          if [ "$TEST_EXIT" -ne 0 ]; then
            STEP_STATUS="failed"
            STEP_ERROR="Automated test suite failed. See tests_only.log in result artifact."
          fi

          TEST_EXIT="$TEST_EXIT" STEP_STATUS="$STEP_STATUS" STEP_ERROR="$STEP_ERROR" python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
              "project_id": os.environ.get("PROJECT_ID_INPUT", "unknown"),
              "step": "automated_tests_only",
              "status": os.environ["STEP_STATUS"],
              "mode": "tests_only",
              "error": os.environ["STEP_ERROR"],
          }
          if not payload["error"]:
              payload.pop("error")
          p = Path(os.environ["RESULT_DIR"]) / "automated_tests_only.json"
          p.write_text(json.dumps(payload, indent=2, ensure_ascii=True) + "\n", encoding="utf-8")
          PY

          cat "$TESTS_ONLY_LOG_FILE"
          if [ "$TEST_EXIT" -ne 0 ]; then
            exit "$TEST_EXIT"
          fi

      - name: 6) Execute factory pipeline
        if: env.RUN_MODE != 'tests_only'
        env:
          GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          FACTORY_GITHUB_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
          FACTORY_BASE_URL: ${{ secrets.FACTORY_BASE_URL }}
        run: |
          set -euo pipefail
          DRY_RUN_FLAG=""
          if [ "${EFFECTIVE_DRY_RUN}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          python scripts/factory_orchestrator.py \
            --brief-file "$BRIEF_FILE" \
            --project-id "$PROJECT_ID_INPUT" \
            --state-db "$STATE_DB" \
            --result-dir "$RESULT_DIR" \
            --run-id "$RUN_ID" \
            --run-attempt "$RUN_ATTEMPT" \
            --workflow-url "$WORKFLOW_URL" \
            --template-owner "${{ github.repository_owner }}" \
            --template-repo "${{ github.event.repository.name }}" \
            --repo-org "${{ github.repository_owner }}" \
            --traffic-signal "${{ inputs.traffic_signal }}" \
            --activation-metric "${{ inputs.activation_metric }}" \
            --revenue-signal-status "${{ inputs.revenue_signal_status }}" \
            --result-file "$RESULT_DIR/factory-response.json" \
            $DRY_RUN_FLAG

      - name: 7) Read orchestrator outputs
        if: always()
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_ENV"
          import json
          import os
          from pathlib import Path

          result_dir = os.environ.get("RESULT_DIR", "")
          if not result_dir:
              print("DEPLOYMENT_URL=")
          else:
              p = Path(result_dir) / "factory-response.json"
              if p.is_file():
                  try:
                      data = json.loads(p.read_text(encoding="utf-8"))
                      print(f"DEPLOYMENT_URL={data.get('deployment_url', '')}")
                  except (json.JSONDecodeError, OSError):
                      print("DEPLOYMENT_URL=")
              else:
                  print("DEPLOYMENT_URL=")
          PY

      - name: 8) Notify Managing Director
        if: always()
        env:
          FACTORY_BASE_URL: ${{ secrets.FACTORY_BASE_URL }}
          PROJECT_ID_INPUT: ${{ env.PROJECT_ID_INPUT }}
          RUN_ID: ${{ env.RUN_ID }}
          RESULT_DIR: ${{ env.RESULT_DIR }}
          DEPLOYMENT_URL: ${{ env.DEPLOYMENT_URL }}
          RUN_MODE: ${{ env.RUN_MODE }}
        run: |
          set -euo pipefail
          if [ -z "${RESULT_DIR:-}" ]; then
            RESULT_DIR="$(mktemp -d "$RUNNER_TEMP/factory-results-fallback-${{ github.run_id }}-${{ github.run_attempt }}-XXXXXX")"
            mkdir -p "$RESULT_DIR"
          fi

          HEALTH_RESULT="$(python - <<'PY'
          import json, os, sys
          run_mode = os.environ.get("RUN_MODE", "")
          p = os.path.join(os.environ.get("RESULT_DIR", ""), "deploy_health.json")
          try:
              with open(p, "r", encoding="utf-8") as f:
                  health_status = json.load(f).get("health_status", "unknown")
              build_status = "succeeded" if health_status == "healthy" else "failed"
          except (FileNotFoundError, json.JSONDecodeError) as exc:
              print(f"[notify] deploy_health.json read error: {exc}", file=sys.stderr)
              if run_mode == "tests_only":
                  health_status = "tests_only"
                  build_status = "succeeded"
              else:
                  health_status = "unknown"
                  build_status = "use_job_status"
          print(f"{build_status}:{health_status}")
          PY
          )"
          BUILD_STATUS="${HEALTH_RESULT%%:*}"
          HEALTH_STATUS_DETAIL="${HEALTH_RESULT#*:}"

          # Fall back to job status when deploy_health.json was not written
          if [ "$BUILD_STATUS" = "use_job_status" ]; then
            if [ "${{ job.status }}" = "success" ]; then
              BUILD_STATUS="succeeded"
            else
              BUILD_STATUS="failed"
            fi
          fi

          DRY_RUN_FLAG=""
          if [ "${EFFECTIVE_DRY_RUN:-false}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          REPO_URL_VAL="$(python - <<'PY'
          import json, os, sys
          p = os.path.join(os.environ.get("RESULT_DIR", ""), "create_repo.json")
          try:
              with open(p, "r", encoding="utf-8") as f:
                  print(json.load(f).get("repo_url", ""))
          except (FileNotFoundError, json.JSONDecodeError) as exc:
              print(f"[notify] create_repo.json read error: {exc}", file=sys.stderr)
              print("")
          PY
          )"

          NOTIFY_ARGS=(
            --project-id "${PROJECT_ID_INPUT:-unknown}"
            --run-id "${RUN_ID:-${{ github.run_id }}}"
            --status "$BUILD_STATUS"
            --deploy-url "${DEPLOYMENT_URL:-}"
            --repo-url "$REPO_URL_VAL"
            --result-file "$RESULT_DIR/notify_director.json"
          )
          if [ "$BUILD_STATUS" = "failed" ]; then
            NOTIFY_ARGS+=(--error "Build failed with health_status: ${HEALTH_STATUS_DETAIL}; check deploy_health.json and step logs for details")
          fi
          if [ -n "$DRY_RUN_FLAG" ]; then
            NOTIFY_ARGS+=(--dry-run)
          fi

          python scripts/notify_director.py "${NOTIFY_ARGS[@]}" || true

      - name: 8b) Callback to Managing Director
        if: always() && env.CALLBACK_URL != ''
        env:
          CALLBACK_URL: ${{ inputs.callback_url }}
          FACTORY_SECRET: ${{ secrets.FACTORY_SECRET }}
          CORRELATION_ID: ${{ env.CORRELATION_ID }}
          RUN_ID: ${{ env.RUN_ID }}
          RESULT_DIR: ${{ env.RESULT_DIR }}
          DEPLOYMENT_URL: ${{ env.DEPLOYMENT_URL }}
        run: |
          set -euo pipefail
          if [ -z "${CALLBACK_URL:-}" ]; then
            echo "[callback] No callback_url configured — skipping."
            exit 0
          fi

          if [ "${{ job.status }}" = "success" ]; then
            BUILD_STATUS="succeeded"
          else
            BUILD_STATUS="failed"
          fi

          DRY_RUN_FLAG=""
          if [ "${EFFECTIVE_DRY_RUN:-false}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          REPO_URL_VAL="$(python - <<'PY'
          import json, os, sys
          p = os.path.join(os.environ.get("RESULT_DIR", ""), "create_repo.json")
          try:
              with open(p, "r", encoding="utf-8") as f:
                  print(json.load(f).get("repo_url", ""))
          except (FileNotFoundError, json.JSONDecodeError):
              print("")
          PY
          )"

          CALLBACK_ARGS=(
            --project-id "${PROJECT_ID_INPUT:-unknown}"
            --correlation-id "${CORRELATION_ID:-}"
            --callback-url "${CALLBACK_URL}"
            --status "$BUILD_STATUS"
            --run-id "${RUN_ID:-${{ github.run_id }}}"
            --workflow-url "${WORKFLOW_URL:-}"
            --deploy-url "${DEPLOYMENT_URL:-}"
            --repo-url "$REPO_URL_VAL"
            --result-file "$RESULT_DIR/factory_callback.json"
          )
          if [ "$BUILD_STATUS" = "failed" ]; then
            CALLBACK_ARGS+=(--error-summary "Factory build failed; check workflow logs")
          fi
          if [ -n "$DRY_RUN_FLAG" ]; then
            CALLBACK_ARGS+=(--dry-run)
          fi

          python scripts/factory_callback.py "${CALLBACK_ARGS[@]}" || true

      - name: 8c) Generate launch assets
        if: env.RUN_MODE != 'tests_only'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEPLOYMENT_URL: ${{ env.DEPLOYMENT_URL }}
          BRIEF_FILE: ${{ env.BRIEF_FILE }}
          RESULT_DIR: ${{ env.RESULT_DIR }}
        run: |
          set -euo pipefail
          DRY_RUN_FLAG=""
          if [ "${EFFECTIVE_DRY_RUN:-false}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          DEPLOY_URL="${DEPLOYMENT_URL:-https://${{ inputs.project_id }}.vercel.app}"

          python scripts/launch_assets_engine.py \
            --brief-file "${BRIEF_FILE}" \
            --deployment-url "$DEPLOY_URL" \
            --project-id "${PROJECT_ID_INPUT:-${{ inputs.project_id }}}" \
            --output-dir "${RESULT_DIR}" \
            --result-file "${RESULT_DIR}/launch_assets.json" \
            $DRY_RUN_FLAG || true

      - name: 9) Portfolio simplified summary
        if: always()
        run: |
          set -euo pipefail
          if [ -z "${RESULT_DIR:-}" ]; then
            RESULT_DIR="$(mktemp -d "$RUNNER_TEMP/factory-results-fallback-${{ github.run_id }}-${{ github.run_attempt }}-XXXXXX")"
            mkdir -p "$RESULT_DIR"
          fi
          python scripts/portfolio_summary.py \
            --state-db "$STATE_DB" \
            --result-file "$RESULT_DIR/portfolio_summary.json" || true

      - name: 10) Finalize factory response
        if: always()
        id: finalize
        env:
          PROJECT_ID_INPUT: ${{ env.PROJECT_ID_INPUT }}
          RAW_PROJECT_ID: ${{ inputs.project_id }}
          RESULT_DIR: ${{ env.RESULT_DIR }}
          RUN_MODE: ${{ env.RUN_MODE }}
          JOB_STATUS: ${{ job.status }}
          RESULT_ARTIFACT_NAME: ${{ env.RESULT_ARTIFACT_NAME }}
          RUN_ID: ${{ env.RUN_ID }}
          RUN_ATTEMPT: ${{ env.RUN_ATTEMPT }}
          WORKFLOW_URL: ${{ env.WORKFLOW_URL }}
          TIMESTAMP_UTC: ${{ env.TIMESTAMP_UTC }}
        run: |
          set -euo pipefail
          if [ -z "${RESULT_DIR:-}" ]; then
            RESULT_DIR="$(mktemp -d "$RUNNER_TEMP/factory-results-fallback-${{ github.run_id }}-${{ github.run_attempt }}-XXXXXX")"
            mkdir -p "$RESULT_DIR"
          fi
          echo "RESULT_DIR=$RESULT_DIR" >> "$GITHUB_ENV"

          RESPONSE_FILE="$RESULT_DIR/factory-response.json"

          # If the orchestrator did not write factory-response.json (tests_only
          # or early failure), assemble a minimal response from available step files.
          if [ ! -f "$RESPONSE_FILE" ]; then
            python - <<'PY'
          import json
          import os
          from pathlib import Path

          project_id = os.environ.get("PROJECT_ID_INPUT") or os.environ.get("RAW_PROJECT_ID", "unknown")
          run_mode = os.environ.get("RUN_MODE", "unknown")
          result_dir = Path(os.environ["RESULT_DIR"])
          result_dir.mkdir(parents=True, exist_ok=True)

          step_files = [
              ("normalize_inputs", result_dir / "normalize_inputs.json"),
              ("automated_tests_only", result_dir / "automated_tests_only.json"),
          ]

          steps = []
          overall_status = "failed" if os.environ.get("JOB_STATUS") == "failure" else "success"
          errors = []

          for step_name, step_path in step_files:
              if step_path.exists():
                  data = json.loads(step_path.read_text(encoding="utf-8"))
              else:
                  data = {"project_id": project_id, "step": step_name,
                          "status": "skipped", "mode": run_mode}
              steps.append(data)
              if data.get("status") == "failed":
                  overall_status = "failed"
                  err = str(data.get("error", "")).strip()
                  if err:
                      errors.append(f"{step_name}: {err}")

          try:
              import sys as _sys
              _sys.path.insert(0, "scripts")
              from factory_run_contract import CONTRACT_VERSION as _cv
              _contract_ver = str(_cv).strip() or "v1"
          except Exception:
              _contract_ver = "v1"

          response = {
              "contract_version": _contract_ver,
              "project_id": project_id,
              "run_id": os.environ.get("RUN_ID", ""),
              "run_attempt": os.environ.get("RUN_ATTEMPT", ""),
              "workflow_url": os.environ.get("WORKFLOW_URL", ""),
              "timestamp_utc": os.environ.get("TIMESTAMP_UTC", ""),
              "repo_url": "",
              "deployment_url": "",
              "status": overall_status,
              "run_mode": run_mode,
              "idempotency_key": "",
              "steps": steps,
              "deployment": {"status": "not_applicable", "url": ""},
              "quality_result": {},
              "error_summary": "; ".join(errors),
              "failure_reason": "; ".join(errors) if errors else "",
              "kill_candidate": False,
              "optimize_candidate": False,
              "scale_candidate": False,
              "result_artifact": {
                  "name": os.environ.get("RESULT_ARTIFACT_NAME", ""),
                  "path": "factory-response.json",
              },
          }
          response_path = result_dir / "factory-response.json"
          response_path.write_text(
              json.dumps(response, indent=2, ensure_ascii=True) + "\n", encoding="utf-8"
          )
          print(json.dumps(response, ensure_ascii=True))
          PY
          fi

          echo "factory_response<<EOF" >> "$GITHUB_OUTPUT"
          cat "$RESPONSE_FILE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          response_file = Path(os.environ["RESULT_DIR"]) / "factory-response.json"
          response = json.loads(response_file.read_text(encoding="utf-8"))
          lines = [
              f"RUN MODE: {str(response.get('run_mode', 'unknown')).upper()}",
              f"RUN STATUS: {str(response.get('status', 'failed')).upper()}",
              f"PROJECT ID: {response.get('project_id', 'unknown')}",
              f"RUN ID: {response.get('run_id', '')}",
              f"RUN ATTEMPT: {response.get('run_attempt', '')}",
              f"WORKFLOW URL: {response.get('workflow_url', '')}",
              f"REPO: {response.get('repo_url', 'not-created')}",
              f"DEPLOYMENT: {response.get('deployment_url', 'not-available')}",
              f"LAUNCH ASSETS: {'See LAUNCH_ASSETS.md in artifacts' if response.get('deployment_url') else 'not-generated'}",
              f"IDEMPOTENCY KEY: {response.get('idempotency_key', 'not-available')}",
              f"CONTRACT VERSION: {response.get('contract_version', 'v1')}",
              f"ERROR SUMMARY: {response.get('error_summary', 'none') or 'none'}",
              f"FAILURE REASON: {response.get('failure_reason', 'none') or 'none'}",
              f"KILL CANDIDATE: {response.get('kill_candidate', False)}",
              f"OPTIMIZE CANDIDATE: {response.get('optimize_candidate', False)}",
              f"SCALE CANDIDATE: {response.get('scale_candidate', False)}",
          ]
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("## Factory Execution Summary\n\n")
              for line in lines:
                  handle.write(f"- {line}\n")
          print("\n".join(lines))
          PY

      - name: 11) Emit alert payload on failure
        if: failure()
        env:
          FACTORY_BASE_URL: ${{ secrets.FACTORY_BASE_URL }}
        run: |
          set -euo pipefail
          python scripts/emit_alert.py \
            --project-id "${PROJECT_ID_INPUT:-${{ inputs.project_id }}}" \
            --run-id "$RUN_ID" \
            --run-attempt "$RUN_ATTEMPT" \
            --workflow-url "$WORKFLOW_URL" \
            --failure-reason "factory-build failed" \
            --error-summary "Check factory-response.json and step logs for details" \
            --result-file "$RESULT_DIR/alert_payload.json"

      - name: 12) Upload result artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RESULT_ARTIFACT_NAME }}
          if-no-files-found: warn
          path: |
            ${{ env.RESULT_DIR }}/factory-response.json
            ${{ env.RESULT_DIR }}/*.json
            ${{ env.RESULT_DIR }}/*.log
            ${{ env.RESULT_DIR }}/LAUNCH_ASSETS.md
            data/lifecycle.sqlite
