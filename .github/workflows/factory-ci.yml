name: factory-ci

on:
  pull_request:
  push:
    branches:
      - main
      - cursor/**

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run factory automated tests
        run: |
          set -euo pipefail
          python scripts/run_factory_tests.py --verbose
