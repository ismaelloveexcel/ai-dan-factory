name: factory-ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - cursor/**

concurrency:
  group: factory-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run factory automated tests
        run: |
          set -euo pipefail
          python scripts/run_factory_tests.py

      - name: Run integration tests
        run: |
          set -euo pipefail
          python scripts/run_integration_tests.py
