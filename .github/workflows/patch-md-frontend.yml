name: Patch MD Frontend (Social Card + Video UI)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to confirm patch'
        required: true
        default: 'YES'

jobs:
  patch-md:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Factory
        uses: actions/checkout@v4

      - name: Patch aidan-managing-director/main.py
        env:
          GH_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import base64, json, urllib.request, urllib.error
          import os

          TOKEN = os.environ['GH_TOKEN']
          OWNER = 'ismaelloveexcel'
          REPO  = 'aidan-managing-director'
          PATH  = 'main.py'
          BRANCH = 'main'

          headers = {
              'Authorization': f'Bearer {TOKEN}',
              'Accept': 'application/vnd.github+json',
              'Content-Type': 'application/json',
              'X-GitHub-Api-Version': '2022-11-28',
          }

          # 1. Fetch current file
          url = f'https://api.github.com/repos/{OWNER}/{REPO}/contents/{PATH}'
          req = urllib.request.Request(url, headers=headers)
          with urllib.request.urlopen(req) as r:
              data = json.load(r)
          sha = data['sha']
          content = base64.b64decode(data['content']).decode('utf-8')
          print(f'Fetched {PATH} ({len(content)} chars, sha={sha[:8]})')

          def rep(label, old, new, c):
              if old not in c:
                  print(f'  SKIP {label}')
                  return c
              c = c.replace(old, new, 1)
              print(f'  OK   {label}')
              return c

          # 1. Region selector
          content = rep('region selector',
            '        <label for="launch-cta">Call to action</label>\n        <input type="text" id="launch-cta" placeholder="e.g. Get early access free"/>\n\n        <div style="margin-top:1rem">\n          <button class="btn btn-primary btn-full" id="launch-btn" onclick="generateLaunch()">\n            &#9889; Generate All Content\n          </button>\n        </div>\n        <div id="launch-error" class="alert alert-error" style="display:none"></div>',
            '        <label for="launch-cta">Call to action</label>\n        <input type="text" id="launch-cta" placeholder="e.g. Get early access free"/>\n\n        <label for="launch-region">&#127758; Target Region</label>\n        <select id="launch-region" onchange="onRegionChange()">\n          <option value="global">&#127758; Global (All regions)</option>\n          <option value="mena">MENA (Middle East &amp; North Africa)</option>\n          <option value="africa">Sub-Saharan Africa</option>\n          <option value="south_asia">South Asia (India, Pakistan, BD)</option>\n          <option value="southeast_asia">Southeast Asia</option>\n          <option value="latam">Latin America</option>\n          <option value="europe">Western Europe</option>\n          <option value="north_america">North America</option>\n        </select>\n        <div id="region-insight" class="alert alert-info" style="display:none;font-size:.78rem;margin:.5rem 0"></div>\n\n        <div style="margin-top:1rem">\n          <button class="btn btn-primary btn-full" id="launch-btn" onclick="generateLaunch()">\n            &#9889; Generate All Content\n          </button>\n        </div>\n        <div id="launch-error" class="alert alert-error" style="display:none"></div>',
            content
          )

          # 2. Social card + video (position injection)
          idx = content.find('</div>\n</div>\n\n<!-- ')
          while idx != -1:
              chunk = content[idx:idx+150]
              if 'TAB 6' in chunk or 'REVENUE' in chunk:
                  break
              idx = content.find('</div>\n</div>\n\n<!-- ', idx+1)
          if idx != -1:
              INJECTION = '\n\n  <!-- SOCIAL CARD GENERATOR -->\n  <div class="card" style="margin-top:1.2rem">\n    <div class="card-title">&#127912; Animated Social Card Generator</div>\n    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;align-items:start">\n      <div>\n        <label for="card-size">Card Size</label>\n        <select id="card-size" onchange="updateCardPreview()">\n          <option value="square">Instagram Square (1080x1080)</option>\n          <option value="landscape">Twitter/LinkedIn (1200x630)</option>\n          <option value="story">Story / TikTok (1080x1920)</option>\n        </select>\n        <label for="card-style">Background Style</label>\n        <select id="card-style" onchange="updateCardPreview()">\n          <option value="purple">Gradient Purple</option>\n          <option value="dark">Gradient Dark</option>\n          <option value="sunset">Gradient Sunset</option>\n          <option value="ocean">Gradient Ocean</option>\n          <option value="black">Solid Black</option>\n        </select>\n        <label for="card-name">Product Name</label>\n        <input type="text" id="card-name" placeholder="e.g. GameForge" oninput="updateCardPreview()"/>\n        <label for="card-tagline">Tagline (max 60 chars)</label>\n        <input type="text" id="card-tagline" maxlength="60" placeholder="e.g. Send games, not just gifts" oninput="updateCardPreview()"/>\n        <label for="card-url">URL (short)</label>\n        <input type="text" id="card-url" placeholder="e.g. gameforge.app" oninput="updateCardPreview()"/>\n        <label for="card-accent">Accent Colour</label>\n        <input type="color" id="card-accent" value="#5b6ef7" oninput="updateCardPreview()" style="width:60px;height:32px;padding:2px;cursor:pointer"/>\n        <div style="margin-top:.8rem;display:flex;gap:.5rem">\n          <button class="btn btn-secondary" style="flex:1" onclick="updateCardPreview()">&#128065; Preview</button>\n          <button class="btn btn-success" style="flex:1" onclick="downloadSocialCard()">&#11123; Download PNG</button>\n        </div>\n      </div>\n      <div style="text-align:center">\n        <canvas id="social-card-canvas" width="300" height="300"\n          style="border-radius:12px;width:100%;max-width:300px;border:1px solid var(--border2);cursor:pointer"\n          onclick="downloadSocialCard()" title="Click to download full-size PNG"></canvas>\n        <div style="font-size:.72rem;color:var(--text4);margin-top:.4rem">Click card to download full-size PNG</div>\n        <div style="margin-top:.5rem;font-size:.72rem;color:var(--text3)">&#128039; AI-DAN Dodo mascot included</div>\n      </div>\n    </div>\n  </div>\n\n  <!-- PROMO VIDEO GENERATOR -->\n  <div class="card" style="margin-top:1.2rem">\n    <div class="card-title">&#127916; AI Promo Video Generator <span style="font-size:.7rem;color:var(--text3);font-weight:400;margin-left:.5rem">Free &bull; GitHub Actions &bull; ~3 min</span></div>\n    <div class="alert alert-info" style="font-size:.78rem;margin-bottom:.8rem">\n      &#128161; AI writes a creative video script (Grok/OpenAI), then renders a free MP4 via GitHub Actions. No paid video tools. Download artifact from GitHub when done.\n    </div>\n    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem">\n      <div>\n        <label for="vid-product">Product Name</label>\n        <input type="text" id="vid-product" placeholder="e.g. GameForge"/>\n        <label for="vid-tagline">Tagline</label>\n        <input type="text" id="vid-tagline" placeholder="e.g. Send games, not just gifts"/>\n        <label for="vid-url">Product URL</label>\n        <input type="url" id="vid-url" placeholder="https://..."/>\n      </div>\n      <div>\n        <label for="vid-region">Target Region</label>\n        <select id="vid-region">\n          <option value="global">&#127758; Global</option>\n          <option value="mena">MENA</option>\n          <option value="africa">Africa</option>\n          <option value="south_asia">South Asia</option>\n          <option value="southeast_asia">Southeast Asia</option>\n          <option value="latam">Latin America</option>\n          <option value="europe">Europe</option>\n          <option value="north_america">North America</option>\n        </select>\n        <div style="margin-top:.6rem"><label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;font-weight:normal;font-size:.85rem"><input type="checkbox" id="vid-ai-concept" checked style="width:auto;margin:0"/> &#10024; Use AI to write video script</label></div>\n        <div style="margin-top:.8rem"><button class="btn btn-primary btn-full" id="vid-btn" onclick="triggerVideoGeneration()">&#127916; Generate Free Promo Video</button></div>\n        <div id="vid-result" style="margin-top:.6rem;font-size:.78rem"></div>\n      </div>\n    </div>\n  </div>'
              content = content[:idx] + INJECTION + content[idx:]
              print(f'  OK   social card + video injection at {idx}')
          else:
              print('  SKIP social card injection: TAB6 boundary not found')

          # 3. Region in payload
          content = rep('region in payload',
            "  const payload = {\n    project_id: projId || null,\n    title: title,\n    url: url,\n    description: desc,\n    target_user: document.getElementById('launch-user').value.trim(),\n    cta: document.getElementById('launch-cta').value.trim(),\n  };",
            "  const payload = {\n    project_id: projId || null,\n    title: title,\n    url: url,\n    description: desc,\n    target_user: document.getElementById('launch-user').value.trim(),\n    cta: document.getElementById('launch-cta').value.trim(),\n    target_region: (document.getElementById('launch-region') || {}).value || 'global',\n  };",
            content
          )

          # 4. Platforms forEach
          OLD4 = """const platforms = [\n    {key:'twitter', label:'&#120143; X / Twitter', text: content.twitter || content.tweet || content.x || ''},\n    {key:'linkedin', label:'&#128188; LinkedIn', text: content.linkedin || ''},\n    {key:'email', label:'&#128140; Cold Outreach Email', text: content.email || content.cold_email || ''},\n    {key:'producthunt', label:'&#128049; Product Hunt Tagline', text: content.product_hunt || content.ph_tagline || content.tagline || ''},\n    {key:'reddit', label:'&#128257; Reddit Post', text: content.reddit || ''},\n  ];\n\n  let blocksHtml = '';\n  platforms.forEach(function(p) {\n    if (!p.text) return;\n    const btnId = 'copy-' + p.key;\n    blocksHtml += '<div class=\\"content-block\\">' +\n      '<div class=\\"content-platform\\">' + p.label +\n        '<button class=\\"btn btn-xs btn-ghost\\" id=\\"' + btnId + '\\" onclick=\\"copyText(this.getAttribute(\\\\'data-text\\\\'),this)\\" data-text=\\"' + esc(p.text) + '\\">Copy</button>' +\n      '</div>' +\n      '<div class=\\"content-text\\">' + esc(p.text) + '</div>' +\n    '</div>';\n  });"""
          NEW4 = """// Support regional platforms + legacy\n  const pd = data.platforms || {};\n  const legacy_c = data.content || data;\n  let regionBanner = '';\n  if (data.region_label || data.regional_notes) {\n    regionBanner = '<div class=\\"alert alert-info\\" style=\\"font-size:.78rem;margin-bottom:.8rem\\">' +\n      '&#127758; <strong>' + esc(data.region_label || 'Global') + '</strong>' +\n      (data.regional_notes ? ' &mdash; ' + esc(data.regional_notes) : '') + '</div>';\n  }\n  const PLAT_LABELS = {\n    tiktok:'&#9654; TikTok / Reels', instagram:'&#128247; Instagram',\n    whatsapp:'&#128241; WhatsApp', facebook:'&#128100; Facebook',\n    snapchat:'&#128095; Snapchat', youtube:'&#9654; YouTube Shorts',\n    twitter:'&#120143; X / Twitter', linkedin:'&#128188; LinkedIn',\n    reddit:'&#128257; Reddit', email:'&#128140; Cold Email',\n    product_hunt:'&#128049; Product Hunt',\n    tweet:'&#120143; X / Twitter', cold_email:'&#128140; Cold Email', ph_tagline:'&#128049; Product Hunt',\n  };\n  let blocksHtml = '', allText = '';\n  const seen_labels = new Set();\n  Object.keys(PLAT_LABELS).forEach(function(k) {\n    const lbl = PLAT_LABELS[k];\n    if (seen_labels.has(lbl)) return;\n    const raw = pd[k] || legacy_c[k];\n    if (!raw) return;\n    seen_labels.add(lbl);\n    var dispH = '', cpT = '';\n    if (typeof raw === 'string') { dispH = '<div class=\\"content-text\\">' + esc(raw) + '</div>'; cpT = raw; }\n    else if (typeof raw === 'object' && !Array.isArray(raw)) {\n      dispH = '<div class=\\"content-text\\" style=\\"padding:0\\">';\n      Object.keys(raw).forEach(function(field) {\n        var v = raw[field]; if (!v || (Array.isArray(v) && !v.length)) return;\n        var fl = field.replace(/_/g,' ').replace(/\\b\\w/g,function(ch){return ch.toUpperCase();});\n        var vs = Array.isArray(v) ? v.join(', ') : String(v);\n        dispH += '<div style=\\"padding:.35rem .6rem;border-bottom:1px solid var(--border2)\\"><span style=\\"font-size:.68rem;color:var(--text3);text-transform:uppercase\\">' + esc(fl) + '</span><br><span style=\\"font-size:.82rem\\">' + esc(vs) + '</span></div>';\n        cpT += fl + ': ' + vs + '\\n';\n      });\n      dispH += '</div>';\n    }\n    allText += '=== ' + lbl.replace(/&#[0-9]+;/g,'') + ' ===\\n' + cpT + '\\n\\n';\n    blocksHtml += '<div class=\\"content-block\\" style=\\"margin-bottom:.6rem\\"><div class=\\"content-platform\\">' + lbl +\n      '<button class=\\"btn btn-xs btn-ghost\\" onclick=\\"copyText(this.dataset.cp,this)\\" data-cp=\\"' + esc(cpT) + '\\">Copy</button>' +\n      '</div>' + dispH + '</div>';\n  });"""
          content = rep('platforms forEach', OLD4, NEW4, content)

          # 5. Output HTML
          OLD5 = """  document.getElementById('launch-output').innerHTML =\n    '<div class=\\"card\\"><div class=\\"card-title\\">&#128227; Launch Content \u2014 ' + esc(title) + '</div>' +\n    (url ? '<div style=\\"font-size:.78rem;color:var(--text3);margin-bottom:.8rem\\">&#127758; ' + esc(url) + '</div>' : '') +\n    blocksHtml + '</div>' +\n    '<div class=\\"card\\"><div class=\\"card-title\\">&#9989; 48-Hour Launch Checklist</div>' + checkHtml + '</div>';\n}"""
          NEW5 = """  var expBtn = allText ? '<button class=\\"btn btn-xs btn-ghost\\" style=\\"margin-left:auto\\" onclick=\\"copyText(this.dataset.all,this)\\" data-all=\\"' + esc(allText) + '\\">&#128196; Export All</button>' : '';\n  document.getElementById('launch-output').innerHTML =\n    '<div class=\\"card\\"><div class=\\"card-title\\">&#128227; Launch Content &mdash; ' + esc(title) + expBtn + '</div>' +\n    (url ? '<div style=\\"font-size:.78rem;color:var(--text3);margin-bottom:.8rem\\">&#127758; ' + esc(url) + '</div>' : '') +\n    regionBanner + blocksHtml + '</div>' +\n    '<div class=\\"card\\"><div class=\\"card-title\\">&#9989; 48-Hour Launch Checklist</div>' + checkHtml + '</div>';\n  var cn=document.getElementById('card-name'),cu=document.getElementById('card-url');\n  if(cn&&!cn.value&&title) cn.value=title;\n  if(cu&&!cu.value&&url) cu.value=url.replace(/^https?:\\\/\\//,'');\n  var vp=document.getElementById('vid-product'),vu=document.getElementById('vid-url');\n  if(vp&&!vp.value&&title) vp.value=title;\n  if(vu&&!vu.value&&url) vu.value=url;\n  var lr=document.getElementById('launch-region'),vr=document.getElementById('vid-region');\n  if(lr&&vr) vr.value=lr.value;\n  setTimeout(updateCardPreview,400);\n}"""
          content = rep('output HTML + prefill', OLD5, NEW5, content)

          # 6. New JS functions
          OLD6 = """function savePaymentLink() {\n  const url = document.getElementById('payment-url').value.trim();\n  if (!url) return;\n  localStorage.setItem('payment_link', url);\n  document.getElementById('saved-payment-link').innerHTML = '&#10003; Saved: <a href=\\"' + esc(url) + '\\" target=\\"_blank\\">' + esc(url) + '</a>';\n  toast('Payment link saved!', 'success');\n}"""
          NEW6 = r"""function savePaymentLink() {
  const url = document.getElementById('payment-url').value.trim();
  if (!url) return;
  localStorage.setItem('payment_link', url);
  document.getElementById('saved-payment-link').innerHTML = '&#10003; Saved: <a href="' + esc(url) + '" target="_blank">' + esc(url) + '</a>';
  toast('Payment link saved!', 'success');
}
const REGION_NOTES={global:null,mena:'&#128161; MENA: Instagram+Snapchat lead. WhatsApp forwards are #1 viral. Arabic content outperforms English.',africa:'&#128161; Africa: WhatsApp group forwards are massive. Facebook groups drive trust. Short videos win.',south_asia:'&#128161; South Asia: WhatsApp groups = viral channel #1. High price sensitivity — offer free/cheap tier.',southeast_asia:'&#128161; SE Asia: Facebook dominant in PH/MY/ID. TikTok exploding in TH/VN. Playful tone wins.',latam:'&#128161; LatAm: Instagram Stories & Reels dominate. Emotional storytelling beats feature lists.',europe:'&#128161; Europe: Privacy-conscious — mention data safety. LinkedIn for B2B. TikTok growing in UK/DE.',north_america:'&#128161; North America: Reddit & X for community. TikTok for consumer. LinkedIn for B2B.'};
function onRegionChange(){var r=(document.getElementById('launch-region')||{}).value||'global';var el=document.getElementById('region-insight');var n=REGION_NOTES[r];if(el){if(n){el.innerHTML=n;el.style.display='block';}else el.style.display='none';}var vr=document.getElementById('vid-region');if(vr)vr.value=r;}
const CARD_GRADIENTS={purple:['#1a0533','#3d1470','#5b1ea8','#7c3aed'],dark:['#0a0a0a','#1a1a2e','#16213e','#0f3460'],sunset:['#1a0520','#6b1a1a','#c0392b','#e67e22'],ocean:['#0a1628','#1a3a5c','#0e7490','#22d3ee'],black:['#000','#111','#111','#000']};
function drawDodoOnCanvas(ctx,x,y,sz){var s=sz/100;ctx.save();ctx.translate(x,y);ctx.scale(s,s);ctx.beginPath();ctx.ellipse(50,62,28,26,0,0,Math.PI*2);ctx.fillStyle='#6B4DFF';ctx.fill();ctx.beginPath();ctx.ellipse(50,67,16,18,0,0,Math.PI*2);ctx.fillStyle='#e8e8ff';ctx.fill();ctx.beginPath();ctx.arc(50,36,18,0,Math.PI*2);ctx.fillStyle='#6B4DFF';ctx.fill();ctx.beginPath();ctx.arc(43,32,7,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();ctx.beginPath();ctx.arc(57,32,7,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();ctx.beginPath();ctx.arc(44,33,3.5,0,Math.PI*2);ctx.fillStyle='#1a1a2e';ctx.fill();ctx.beginPath();ctx.arc(58,33,3.5,0,Math.PI*2);ctx.fillStyle='#1a1a2e';ctx.fill();ctx.beginPath();ctx.arc(45.5,31.5,1.2,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();ctx.beginPath();ctx.arc(59.5,31.5,1.2,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();ctx.beginPath();ctx.moveTo(47,40);ctx.lineTo(53,40);ctx.lineTo(50,46);ctx.closePath();ctx.fillStyle='#f59e0b';ctx.fill();ctx.restore();}
var _cHue=0,_cAF=null;
function updateCardPreview(){var cv=document.getElementById('social-card-canvas');if(!cv)return;var ctx=cv.getContext('2d');var st=(document.getElementById('card-style')||{value:'purple'}).value||'purple';var sk=(document.getElementById('card-size')||{value:'square'}).value||'square';var pn=(document.getElementById('card-name')||{value:''}).value||'Your Product';var tg=(document.getElementById('card-tagline')||{value:''}).value||'Your tagline here';var ut=(document.getElementById('card-url')||{value:''}).value||'yourproduct.com';var ac=(document.getElementById('card-accent')||{value:'#5b6ef7'}).value||'#5b6ef7';var wh={square:[300,300],landscape:[300,158],story:[169,300]}[sk]||[300,300];var w=wh[0],h=wh[1];cv.width=w;cv.height=h;if(_cAF){cancelAnimationFrame(_cAF);_cAF=null;}function df(){_cHue=(_cHue+0.6)%360;ctx.save();ctx.filter='hue-rotate('+_cHue+'deg)';var g=CARD_GRADIENTS[st]||CARD_GRADIENTS.purple;var grd=ctx.createLinearGradient(0,0,w,h);grd.addColorStop(0,g[0]);grd.addColorStop(0.35,g[1]);grd.addColorStop(0.7,g[2]);grd.addColorStop(1,g[3]);ctx.fillStyle=grd;ctx.fillRect(0,0,w,h);ctx.filter='none';ctx.restore();drawDodoOnCanvas(ctx,w-42,h-52,40);ctx.textAlign='center';ctx.shadowColor='rgba(0,0,0,0.5)';ctx.fillStyle='#fff';ctx.font='bold '+Math.round(w*0.09)+'px system-ui,sans-serif';ctx.shadowBlur=8;ctx.fillText(pn,w/2,h*0.38);ctx.font=Math.round(w*0.052)+'px system-ui,sans-serif';ctx.fillStyle='rgba(255,255,255,0.85)';ctx.shadowBlur=4;var wd=tg.split(' '),ln='',lns=[],mW=w*0.82;wd.forEach(function(d){var t=ln+(ln?' ':'')+d;if(ctx.measureText(t).width>mW&&ln){lns.push(ln);ln=d;}else ln=t;});if(ln)lns.push(ln);var lh=Math.round(w*0.065),sy=h*0.52;lns.forEach(function(l,i){ctx.fillText(l,w/2,sy+i*lh);});ctx.font=Math.round(w*0.042)+'px system-ui,sans-serif';ctx.fillStyle=ac;ctx.shadowBlur=0;ctx.fillText(ut,w/2,h*0.85);var gl=Math.abs(Math.sin(_cHue*Math.PI/180))*5+2;ctx.strokeStyle=ac;ctx.lineWidth=gl;ctx.strokeRect(1,1,w-2,h-2);_cAF=requestAnimationFrame(df);}df();}
function downloadSocialCard(){var sk=(document.getElementById('card-size')||{value:'square'}).value||'square';var fd={square:[1080,1080],landscape:[1200,630],story:[1080,1920]}[sk]||[1080,1080];var fw=fd[0],fh=fd[1];var off=document.createElement('canvas');off.width=fw;off.height=fh;var ctx=off.getContext('2d');var st=(document.getElementById('card-style')||{value:'purple'}).value||'purple';var pn=(document.getElementById('card-name')||{value:''}).value||'Your Product';var tg=(document.getElementById('card-tagline')||{value:''}).value||'tagline';var ut=(document.getElementById('card-url')||{value:''}).value||'yourproduct.com';var ac=(document.getElementById('card-accent')||{value:'#5b6ef7'}).value||'#5b6ef7';var g=CARD_GRADIENTS[st]||CARD_GRADIENTS.purple;var grd=ctx.createLinearGradient(0,0,fw,fh);grd.addColorStop(0,g[0]);grd.addColorStop(0.35,g[1]);grd.addColorStop(0.7,g[2]);grd.addColorStop(1,g[3]);ctx.fillStyle=grd;ctx.fillRect(0,0,fw,fh);drawDodoOnCanvas(ctx,fw-110,fh-140,100);ctx.textAlign='center';ctx.shadowColor='rgba(0,0,0,0.5)';ctx.fillStyle='#fff';ctx.font='bold '+Math.round(fw*0.09)+'px system-ui,sans-serif';ctx.shadowBlur=15;ctx.fillText(pn,fw/2,fh*0.38);ctx.font=Math.round(fw*0.052)+'px system-ui,sans-serif';ctx.fillStyle='rgba(255,255,255,0.85)';ctx.shadowBlur=8;var wd=tg.split(' '),ln='',lns=[],mW=fw*0.82;wd.forEach(function(d){var t=ln+(ln?' ':'')+d;if(ctx.measureText(t).width>mW&&ln){lns.push(ln);ln=d;}else ln=t;});if(ln)lns.push(ln);var lh=Math.round(fw*0.065),sy=fh*0.52;lns.forEach(function(l,i){ctx.fillText(l,fw/2,sy+i*lh);});ctx.font=Math.round(fw*0.042)+'px system-ui,sans-serif';ctx.fillStyle=ac;ctx.shadowBlur=0;ctx.fillText(ut,fw/2,fh*0.85);ctx.strokeStyle=ac;ctx.lineWidth=6;ctx.strokeRect(3,3,fw-6,fh-6);off.toBlob(function(b){var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=(pn.replace(/\s+/g,'-').toLowerCase()||'card')+'-'+sk+'.png';a.click();URL.revokeObjectURL(a.href);toast('Social card downloaded!','success');},'image/png');}
