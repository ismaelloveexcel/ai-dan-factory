name: Patch MD Frontend (Social Card + Video UI)

on:
  push:
    paths:
      - 'trigger-md-patch.txt'
  workflow_dispatch:

jobs:
  patch-md:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Factory
        uses: actions/checkout@v4

      - name: Run patch script
        env:
          GH_TOKEN: ${{ secrets.FACTORY_GITHUB_TOKEN }}
        run: python3 scripts/patch_md_frontend.py
